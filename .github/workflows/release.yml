name: release

on:
  push:
    tags:
      - "v*"

env:
  MC_VERSIONS: "26.2"
  JAVA_VERSION: "25"

jobs:
  release:
    name: Build & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate version
        run: |
          TAG="${GITHUB_REF_NAME}"
          FULL_VERSION="${TAG#v}"
          MOD_VERSION="${FULL_VERSION%%+*}"

          GRADLE_VERSION=$(grep -E "^mod_version\s*=" gradle.properties \
            | sed 's/.*=\s*//' | tr -d '[:space:]')

          echo "Tag version   : $FULL_VERSION"
          echo "Mod version   : $MOD_VERSION"
          echo "Gradle version: $GRADLE_VERSION"

          if [ "$FULL_VERSION" != "$GRADLE_VERSION" ]; then
            echo "::error::Tag version ($FULL_VERSION) does not match mod_version in gradle.properties ($GRADLE_VERSION)"
            exit 1
          fi

          echo "FULL_VERSION=$FULL_VERSION" >> "$GITHUB_ENV"
          echo "MOD_VERSION=$MOD_VERSION"   >> "$GITHUB_ENV"

      - name: Set release name
        run: |
          RELEASE_NAME="Release ${MOD_VERSION} for Minecraft ${MC_VERSIONS}"
          echo "RELEASE_NAME=$RELEASE_NAME" >> "$GITHUB_ENV"

      - name: Extract changelog
        run: |
          VERSION="$MOD_VERSION"

          NOTES=$(awk \
            "/^## \[${VERSION}\]/{found=1; next} found && /^## /{exit} found && /^---/{exit} found{print}" \
            CHANGELOG.md)

          if [ -z "$NOTES" ]; then
            echo "::error::No entry for [${VERSION}] found in CHANGELOG.md"
            exit 1
          fi

          NOTES=$(echo "$NOTES" | sed '/./,$!d')

          printf '%s' "$NOTES" > release_notes.md
          echo "Release notes preview:"
          cat release_notes.md

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Build
        run: ./gradlew :fabric:build :neoforge:build --no-daemon

      - name: Locate JARs
        run: |
          FABRIC_JAR=$(find fabric/build/libs -name "*.jar" ! -name "*-sources.jar" ! -name "*-javadoc.jar" | head -n 1)
          NEOFORGE_JAR=$(find neoforge/build/libs -name "*.jar" ! -name "*-sources.jar" ! -name "*-javadoc.jar" | head -n 1)

          if [ -z "$FABRIC_JAR" ]; then
            echo "::error::No Fabric JAR found"
            exit 1
          fi

          if [ -z "$NEOFORGE_JAR" ]; then
            echo "::error::No NeoForge JAR found"
            exit 1
          fi

          echo "FABRIC_JAR=$FABRIC_JAR" >> "$GITHUB_ENV"
          echo "NEOFORGE_JAR=$NEOFORGE_JAR" >> "$GITHUB_ENV"
          echo "Found Fabric: $FABRIC_JAR"
          echo "Found NeoForge: $NEOFORGE_JAR"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ env.RELEASE_NAME }}
          body_path: release_notes.md
          files: |
            ${{ env.FABRIC_JAR }}
            ${{ env.NEOFORGE_JAR }}
          draft: false
          prerelease: >-
            ${{
              contains(github.ref_name, '-alpha') ||
              contains(github.ref_name, '-beta')  ||
              contains(github.ref_name, '-rc')
            }}

      - name: Publish Fabric to Modrinth
        env:
          MODRINTH_ID: ${{ secrets.MODRINTH_PROJECT_ID }}
        if: ${{ env.MODRINTH_ID != '' }}
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: ${{ secrets.MODRINTH_PROJECT_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}

          name: ${{ env.RELEASE_NAME }}
          version: ${{ env.FULL_VERSION }}-fabric
          version-type: >-
            ${{
              contains(github.ref_name, '-alpha') && 'alpha' ||
              contains(github.ref_name, '-beta')  && 'beta'  ||
              contains(github.ref_name, '-rc')    && 'beta'  ||
              'release'
            }}
          changelog-file: release_notes.md
          files: |
            ${{ env.FABRIC_JAR }}

          loaders: fabric
          game-versions: ${{ env.MC_VERSIONS }}
          java: ${{ env.JAVA_VERSION }}

      - name: Publish NeoForge to Modrinth
        env:
          MODRINTH_ID: ${{ secrets.MODRINTH_PROJECT_ID }}
        if: ${{ env.MODRINTH_ID != '' }}
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: ${{ secrets.MODRINTH_PROJECT_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}

          name: ${{ env.RELEASE_NAME }}
          version: ${{ env.FULL_VERSION }}-neoforge
          version-type: >-
            ${{
              contains(github.ref_name, '-alpha') && 'alpha' ||
              contains(github.ref_name, '-beta')  && 'beta'  ||
              contains(github.ref_name, '-rc')    && 'beta'  ||
              'release'
            }}
          changelog-file: release_notes.md
          files: |
            ${{ env.NEOFORGE_JAR }}

          loaders: neoforge
          game-versions: ${{ env.MC_VERSIONS }}
          java: ${{ env.JAVA_VERSION }}
